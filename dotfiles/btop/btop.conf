# btop config

# Color theme
color_theme = "tokyo-night"

# Use truecolor (24-bit)
truecolor = True

# Theme background (False = transparent, uses terminal bg)
theme_background = False

# Update time in milliseconds
update_ms = 1000

# Processes sorting ("pid" "program" "arguments" "threads" "user" "memory" "cpu lazy" "cpu direct")
proc_sorting = "cpu lazy"

# Show CPU graph per core
cpu_single_graph = False

# Show process tree
proc_tree = False

# Use filter for shown disks (empty = all)
disks_filter = ""

# Show battery stats
show_battery = True

# Rounded corners on boxes
rounded_corners = True

# Show init screen at start
show_init = False

# Enable vim keys (h,j,k,l)
vim_keys = True
